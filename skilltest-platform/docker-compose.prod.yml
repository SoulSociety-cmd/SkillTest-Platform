version: '3.8'

services:
  # MongoDB Replica Set (3 nodes)
  mongodb1:
    image: mongo:7.0
    container_name: skilltest-mongo1
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: skilltest2024_prod
      REPLICA_SET: rs0
    volumes:
      - mongodb1_data:/data/db
      - ./mongo-init/rs-init.js:/docker-entrypoint-initdb.d/rs-init.js:ro
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: echo 'rs.status().ok || rs.initiate({_id:"rs0",members:[{_id:0,host:"mongodb1:27017"}]}).ok' | mongosh -u root -p skilltest2024_prod --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - skilltest-net

  mongodb2:
    image: mongo:7.0
    container_name: skilltest-mongo2
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: skilltest2024_prod
    volumes:
      - mongodb2_data:/data/db
    command: ["--replSet", "rs0", "--bind_ip_all"]
    depends_on:
      mongodb1:
        condition: service_healthy
    networks:
      - skilltest-net

  mongodb3:
    image: mongo:7.0
    container_name: skilltest-mongo3
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: skilltest2024_prod
    volumes:
      - mongodb3_data:/data/db
    command: ["--replSet", "rs0", "--bind_ip_all"]
    depends_on:
      mongodb2:
        condition: service_started
    networks:
      - skilltest-net

  redis:
    image: redis:7.2-alpine
    container_name: skilltest-redis
    command: redis-server --requirepass skilltest2024_prod --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "skilltest2024_prod", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - skilltest-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: skilltest-backend
    ports:
      - "5000:5000"  # Internal access
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://root:skilltest2024_prod@mongodb1:27017, mongodb2:27017, mongodb3:27017/skilltest?authSource=admin&replicaSet=rs0&authMechanism=DEFAULT
      REDIS_URL: redis://skilltest2024_prod@redis:6379
      JWT_SECRET: skilltest-jwt-prod-2024-supersecret-change-this-in-real-prod
      FRONTEND_URL: https://your-domain.com
      SESSION_SECRET: skilltest-session-prod-2024
    depends_on:
      mongodb1:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads  # Persistent uploads only
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - skilltest-net

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.frontend
    container_name: skilltest-frontend
    expose:
      - "80"
    environment:
      VITE_API_URL: https://your-domain.com/api
    depends_on:
      - backend
    networks:
      - skilltest-net

  nginx:
    image: nginx:alpine
    container_name: skilltest-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client/certs:/etc/nginx/certs:ro  # Add SSL certs here
      - acme:/etc/acme.sh:ro  # Certbot volumes (optional)
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - skilltest-net

volumes:
  mongodb1_data:
  mongodb2_data:
  mongodb3_data:
  redis_data:
  uploads:

networks:
  skilltest-net:
    driver: bridge

# Usage:
# 1. mkdir -p client/certs uploads
# 2. docker compose -f docker-compose.prod.yml up --build -d
# 3. docker exec -it skilltest-mongo1 mongosh -u root -p skilltest2024_prod --eval "rs.initiate()"
